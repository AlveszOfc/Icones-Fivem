<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>pikas</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

/* container igual ao dele (centralizado) */
.container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* imagem responsiva de verdade */
.container img {
    max-width: 100%;
    max-height: 100%;
}
</style>
</head>

<body>
<div class="container">
    <img src="baixados.png">
</div>
</body>
</html>
